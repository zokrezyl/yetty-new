# Yetty Terminal Configuration - Android
# ========================================
# Android-specific configuration for yetty.
# Uses Termux shell when available.

# ─────────────────────────────────────────────────────────────────────────────
# Font Configuration
# ─────────────────────────────────────────────────────────────────────────────
font:
  family: "default"

# ─────────────────────────────────────────────────────────────────────────────
# Rendering Configuration
# ─────────────────────────────────────────────────────────────────────────────
rendering:
  damage-tracking: true
  show-fps: false

# ─────────────────────────────────────────────────────────────────────────────
# Terminal Configuration
# ─────────────────────────────────────────────────────────────────────────────
scrollback:
  lines: 5000

# ─────────────────────────────────────────────────────────────────────────────
# Shell Configuration
# ─────────────────────────────────────────────────────────────────────────────
shell:
  # Toybox shell - symlinked from libtoybox.so at runtime
  path: "/data/data/com.yetty.terminal/cache/bin/sh"

  env:
    TERM: "xterm-256color"
    COLORTERM: "truecolor"
    HOME: "/data/data/com.yetty.terminal/cache"
    SHELL: "/data/data/com.yetty.terminal/cache/bin/sh"
    PATH: "/data/data/com.yetty.terminal/cache/bin:/system/bin"

# ─────────────────────────────────────────────────────────────────────────────
# Plugins Configuration
# ─────────────────────────────────────────────────────────────────────────────
plugins:
  path: ""

# ─────────────────────────────────────────────────────────────────────────────
# RPC Configuration
# ─────────────────────────────────────────────────────────────────────────────
rpc:
  socket-path: ""
  enabled: false

# ─────────────────────────────────────────────────────────────────────────────
# Shader Preloading Configuration
# ─────────────────────────────────────────────────────────────────────────────
shaders:
  preload:
    cards:
      - "0x0000-texture"
      - "0x0003-ydraw"
    glyphs: []

# ─────────────────────────────────────────────────────────────────────────────
# Debug Configuration
# ─────────────────────────────────────────────────────────────────────────────
debug:
  damage-rects: false
