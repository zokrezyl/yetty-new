# Yetty Terminal Configuration
# ============================
# This is the default configuration file for yetty.
# It is installed to ~/.config/yetty/config.yaml on first run.
#
# All settings can be overridden via environment variables by:
#   1. Converting path to uppercase (e.g., rendering/damage-tracking)
#   2. Replacing / and - with _ (RENDERING_DAMAGE_TRACKING)
#   3. Prefixing with YETTY_ (YETTY_RENDERING_DAMAGE_TRACKING)

# ─────────────────────────────────────────────────────────────────────────────
# Font Configuration
# ─────────────────────────────────────────────────────────────────────────────
font:
  # Font family to use (default uses the embedded Nerd Font)
  # Set to a system font name to use fontconfig lookup
  family: "default"

  # Font size in points (currently not configurable, for future use)
  # size: 14

# ─────────────────────────────────────────────────────────────────────────────
# Rendering Configuration
# ─────────────────────────────────────────────────────────────────────────────
rendering:
  # Enable damage tracking for efficient partial redraws
  # Reduces GPU load by only redrawing changed regions
  damage-tracking: true

  # Show FPS counter in the status bar
  show-fps: true

# ─────────────────────────────────────────────────────────────────────────────
# Terminal Configuration
# ─────────────────────────────────────────────────────────────────────────────
terminal:
  text-layer:
    font:
      # Font rendering method: "raster" or "msdf"
      # - raster: Traditional bitmap rendering (faster, but magnifies as
      #           pixels when Ctrl+Scroll-zoomed — looks blurry at large zoom)
      # - msdf:   Multi-channel signed distance field. Crisp at any zoom
      #           level because MSDF is re-evaluated per fragment.
      render-method: "msdf"
      # Font size in pixels (for msdf)
      size: 14

# ─────────────────────────────────────────────────────────────────────────────
# YPaint (non-monospace font used for ypaint text spans)
# ─────────────────────────────────────────────────────────────────────────────
ypaint:
  font:
    # Backend for text spans rendered via the ypaint layer.
    #   msdf   - MSDF atlas (CDB-based, scales smoothly)
    #   raster - FreeType-rasterized R8 atlas (baseline for comparison)
    render-method: "msdf"

scrollback:
  # Number of lines to keep in scrollback buffer
  lines: 10000

# ─────────────────────────────────────────────────────────────────────────────
# Shell Configuration
# ─────────────────────────────────────────────────────────────────────────────
shell:
  # Environment variables to export to the shell
  env:
    TERM: "xterm-256color"
    COLORTERM: "truecolor"
    # YETTY_SOCKET is set at runtime with the RPC socket path

  # Shell command to execute (set via -c/-e flags, not typically in config)
  # command: ""

# ─────────────────────────────────────────────────────────────────────────────
# Plugins Configuration
# ─────────────────────────────────────────────────────────────────────────────
plugins:
  # Colon-separated list of plugin directories
  # Defaults to ./plugins relative to the executable
  path: ""

# ─────────────────────────────────────────────────────────────────────────────
# RPC Configuration
# ─────────────────────────────────────────────────────────────────────────────
rpc:
  # Unix socket path for RPC communication (set at runtime)
  # Typically placed in $XDG_RUNTIME_DIR/yetty-<pid>.sock
  socket-path: ""
  enabled: false

# ─────────────────────────────────────────────────────────────────────────────
# Shader Preloading Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Shaders listed here are compiled at startup to avoid first-use stutter.
# Format: "0xNNNN-name" matching the shader filename (without .wgsl extension)
# Uncomment shaders you use frequently to preload them at startup.
