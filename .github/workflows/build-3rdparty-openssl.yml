name: Build 3rdparty — openssl

# Triggered on `lib-openssl-<version>` tags. Builds OpenSSL 1.1.1w via
# the janbar/openssl-cmake wrapper across every target platform and
# attaches the tarballs to a release of the same name.
#
# Kept alive while downstream deps (cpr / libcurl / libssh2 pins) are
# still on OpenSSL 1.1.1 APIs. The newer upstream openssl/openssl 4.x
# build lives at build-tools/3rdparty/openssl-new/ + the matching
# build-3rdparty-openssl-new.yml workflow. Once all downstream deps are
# bumped to versions that compile against OpenSSL 4, this workflow + dir
# go away and `lib-openssl-*` tags become free.
#
# Version source of truth: build-tools/3rdparty/openssl/version. The tag
# version must match that file's content; the workflow reads the file at
# build time so the tarballs are always self-consistent.

on:
  push:
    tags:
      - 'lib-openssl-*'
      - '!lib-openssl-new-*'   # the openssl-new workflow handles those
  workflow_dispatch: {}

permissions:
  contents: write  # needed to publish release assets

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag:     ${{ steps.read.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          set -euo pipefail
          V="$(tr -d '[:space:]' < build-tools/3rdparty/openssl/version)"
          [ -n "$V" ] || { echo "version file is empty" >&2; exit 1; }
          if [[ "${{ github.event_name }}" == "push" ]]; then
            REF="${GITHUB_REF#refs/tags/}"
            EXPECT="lib-openssl-$V"
            if [ "$REF" != "$EXPECT" ]; then
              echo "tag $REF does not match version file ($EXPECT)" >&2
              exit 1
            fi
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=lib-openssl-$V" >> "$GITHUB_OUTPUT"

  #===========================================================================
  # Linux/Android/webasm — Ubuntu cross.
  # (windows-x86_64 omitted — needs MSVC self-hosted runner.)
  #===========================================================================
  build-linux-cross:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x86_64
          - linux-aarch64
          - android-arm64-v8a
          - android-x86_64
          - webasm
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/openssl/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/openssl-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  build-darwin-arm64:
    needs: resolve
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - macos-arm64
          - ios-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/openssl/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/openssl-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  build-darwin-x86_64:
    needs: resolve
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        target:
          - macos-x86_64
          - ios-x86_64
          - tvos-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/openssl/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/openssl-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  # Windows: MSYS2 CLANG64 — clang + cmake + ninja from mingw-w64.
  build-windows:
    needs: resolve
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: false
          install: >-
            git
            tar
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-lld
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja

      - name: Build openssl for ${{ matrix.target }}
        shell: msys2 {0}
        env:
          TARGET_PLATFORM: ${{ matrix.target }}
        run: |
          mkdir -p out
          OUTPUT_DIR="$(pwd)/out" \
              ./build-tools/3rdparty/openssl/build.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/openssl-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true
