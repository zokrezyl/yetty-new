name: Build 3rdparty — alpine-disk

# Raw ext4 RISC-V Alpine rootfs image for tinyemu virtio-blk root.
# Platform-independent (.noarch) — same disk image regardless of host.
# Triggered on `lib-alpine-disk-<version>` tags. Version source of truth:
# build-tools/3rdparty/alpine-disk/version.
#
# Needs passwordless sudo (losetup/mount/umount) — ubuntu-latest runners
# satisfy this out of the box.

on:
  push:
    tags:
      - 'lib-alpine-disk-*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag:     ${{ steps.read.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          set -euo pipefail
          V="$(tr -d '[:space:]' < build-tools/3rdparty/alpine-disk/version)"
          [ -n "$V" ] || { echo "version file is empty" >&2; exit 1; }
          if [[ "${{ github.event_name }}" == "push" ]]; then
            REF="${GITHUB_REF#refs/tags/}"
            EXPECT="lib-alpine-disk-$V"
            if [ "$REF" != "$EXPECT" ]; then
              echo "tag $REF does not match version file ($EXPECT)" >&2
              exit 1
            fi
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=lib-alpine-disk-$V" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/alpine-disk/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/alpine-disk-*.tar.gz
          fail_on_unmatched_files: true
