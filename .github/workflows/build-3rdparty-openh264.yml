name: Build 3rdparty — openh264

# Triggered on `lib-openh264-<version>` tags. Builds openh264 across every
# target platform and attaches the tarballs to a release of the same name.
#
# Version source of truth: build-tools/3rdparty/openh264/version. The tag
# version must match that file's content; the workflow reads the file at
# build time so the tarballs are always self-consistent.
#
# `lib-*` tags are excluded from .github/workflows/cmake-multi-platform.yml
# so pushing this tag does not trigger the main yetty CI.

on:
  push:
    tags:
      - 'lib-openh264-*'
  workflow_dispatch: {}

permissions:
  contents: write  # needed to publish release assets

jobs:
  #===========================================================================
  # Resolve the version once, from the version file. Used to assert the tag
  # matches and to compose the release tag name.
  #===========================================================================
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag:     ${{ steps.read.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          set -euo pipefail
          V="$(tr -d '[:space:]' < build-tools/3rdparty/openh264/version)"
          [ -n "$V" ] || { echo "version file is empty" >&2; exit 1; }
          if [[ "${{ github.event_name }}" == "push" ]]; then
            REF="${GITHUB_REF#refs/tags/}"
            EXPECT="lib-openh264-$V"
            if [ "$REF" != "$EXPECT" ]; then
              echo "tag $REF does not match version file ($EXPECT)" >&2
              exit 1
            fi
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=lib-openh264-$V" >> "$GITHUB_OUTPUT"

  #===========================================================================
  # Linux/Android/webasm — Ubuntu cross.
  # (windows-x86_64 omitted — needs MSVC; add when we have a self-hosted runner.)
  #===========================================================================
  build-linux-cross:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x86_64
          - linux-aarch64
          - android-arm64-v8a
          - android-x86_64
          - webasm
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/openh264/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/openh264-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  # arm64 darwin: macos-latest is M-series.
  build-darwin-arm64:
    needs: resolve
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - macos-arm64
          - ios-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/openh264/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/openh264-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  # x86_64 darwin: Intel Mac runner.
  build-darwin-x86_64:
    needs: resolve
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        target:
          - macos-x86_64
          - ios-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/openh264/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/openh264-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  # Windows: MSYS2 CLANG64 — clang + GNU make from msys2 base. openh264's
  # mingw_nt platform make rules build natively without cross-prefixing.
  build-windows:
    needs: resolve
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: false
          install: >-
            git
            tar
            make
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-lld
            mingw-w64-clang-x86_64-nasm

      - name: Build openh264 for ${{ matrix.target }}
        shell: msys2 {0}
        env:
          TARGET_PLATFORM: ${{ matrix.target }}
        run: |
          mkdir -p out
          OUTPUT_DIR="$(pwd)/out" \
              ./build-tools/3rdparty/openh264/build.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/openh264-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true
