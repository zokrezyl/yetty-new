name: Build 3rdparty — dav1d

# Triggered on `lib-dav1d-<version>` tags. Builds dav1d across every target
# platform and attaches the tarballs to a release of the same name.
#
# Version source of truth: build-tools/3rdparty/dav1d/version. The tag
# version must match that file's content; the workflow reads the file at
# build time so the tarballs are always self-consistent.

on:
  push:
    tags:
      - 'lib-dav1d-*'
  workflow_dispatch: {}

permissions:
  contents: write  # needed to publish release assets

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag:     ${{ steps.read.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          set -euo pipefail
          V="$(tr -d '[:space:]' < build-tools/3rdparty/dav1d/version)"
          [ -n "$V" ] || { echo "version file is empty" >&2; exit 1; }
          if [[ "${{ github.event_name }}" == "push" ]]; then
            REF="${GITHUB_REF#refs/tags/}"
            EXPECT="lib-dav1d-$V"
            if [ "$REF" != "$EXPECT" ]; then
              echo "tag $REF does not match version file ($EXPECT)" >&2
              exit 1
            fi
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=lib-dav1d-$V" >> "$GITHUB_OUTPUT"

  #===========================================================================
  # Linux/Android/webasm — Ubuntu cross. windows-x86_64 builds on a
  # GitHub-hosted windows-latest runner via msys2/setup-msys2 (CLANG64).
  #===========================================================================
  build-linux-cross:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x86_64
          - linux-aarch64
          - android-arm64-v8a
          - android-x86_64
          - webasm
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/dav1d/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/dav1d-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  build-darwin-arm64:
    needs: resolve
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - macos-arm64
          - ios-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/dav1d/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/dav1d-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  build-darwin-x86_64:
    needs: resolve
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        target:
          - macos-x86_64
          - ios-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/dav1d/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/dav1d-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  build-windows:
    needs: resolve
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: false
          install: >-
            git
            tar
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-lld
            mingw-w64-clang-x86_64-meson
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-pkgconf
            mingw-w64-clang-x86_64-nasm

      - name: Build dav1d for ${{ matrix.target }}
        shell: msys2 {0}
        env:
          TARGET_PLATFORM: ${{ matrix.target }}
        run: |
          mkdir -p out
          OUTPUT_DIR="$(pwd)/out" \
              ./build-tools/3rdparty/dav1d/build.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/dav1d-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true
