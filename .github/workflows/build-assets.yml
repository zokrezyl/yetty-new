name: Build prebuilt assets

# Triggered on `assets-X.Y.Z` tags. Each job runs one asset's build.sh
# wrapper, which re-execs itself under `nix develop .#<shell>` — so every
# runner (Linux + macOS) needs nix installed. iOS/tvOS SDKs still come
# from Xcode on the macOS runner, outside of nix.
#
# Produces tarballs named <asset>[-<platform>]-<version>.tar.gz attached
# to the release at the tag.

on:
  push:
    tags:
      - 'assets-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (X.Y.Z); release tag will be assets-<version>'
        required: true
        default: '0.0.1'

permissions:
  contents: write  # needed to publish release assets

jobs:
  #===========================================================================
  # Version derivation — every job reuses it
  #===========================================================================
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive.outputs.version }}
      tag:     ${{ steps.derive.outputs.tag }}
    steps:
      - id: derive
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            V="${{ github.event.inputs.version }}"
          else
            REF="${GITHUB_REF#refs/tags/}"
            case "$REF" in
              assets-*) V="${REF#assets-}" ;;
              *) echo "unexpected ref $GITHUB_REF" >&2; exit 1 ;;
            esac
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=assets-$V" >> "$GITHUB_OUTPUT"

  #===========================================================================
  # Host-independent RISC-V assets (OpenSBI + Linux kernel + Alpine rootfs)
  # + CDB font databases. All run under .#assets-riscv or .#assets-cdb.
  #===========================================================================
  opensbi:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          VERSION="${{ needs.version.outputs.version }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/assets/opensbi/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: out/opensbi-*.tar.gz
          fail_on_unmatched_files: true

  linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          VERSION="${{ needs.version.outputs.version }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/assets/linux/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: out/linux-*.tar.gz
          fail_on_unmatched_files: true

  cdb:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          VERSION="${{ needs.version.outputs.version }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/assets/cdb/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: out/cdb-*.tar.gz
          fail_on_unmatched_files: true

  #===========================================================================
  # QEMU — host-side emulator binary, one per target platform.
  # Linux/Android targets cross-compile on Ubuntu; macOS/iOS/tvOS on macOS
  # runners. Every shell is a nix devShell defined in flake.nix.
  # (windows-x86_64 omitted — needs a self-hosted MSYS2 Windows runner.)
  #===========================================================================
  qemu-linux-cross:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x86_64
          - linux-aarch64
          - android-arm64-v8a
          - android-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          VERSION="${{ needs.version.outputs.version }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/assets/qemu/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: out/qemu-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  # arm64 targets: Apple Silicon runner (macos-latest is M-series)
  qemu-darwin-arm64:
    needs: version
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - macos-arm64
          - ios-arm64
          - tvos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          VERSION="${{ needs.version.outputs.version }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/assets/qemu/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: out/qemu-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  # x86_64 targets: Intel Mac runner
  qemu-darwin-x86_64:
    needs: version
    runs-on: macos-13
    strategy:
      fail-fast: false
      matrix:
        target:
          - macos-x86_64
          - ios-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          VERSION="${{ needs.version.outputs.version }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/assets/qemu/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: out/qemu-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true
