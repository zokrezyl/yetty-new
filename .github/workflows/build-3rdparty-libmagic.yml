name: Build 3rdparty — libmagic

# Triggered on `lib-libmagic-<version>` tags. 10-target matrix incl.
# Windows MSYS2 CLANG64. file's autotools build needs a native mkmagic
# binary for cross-compile — _build.sh handles the native bootstrap
# automatically.

on:
  push:
    tags:
      - 'lib-libmagic-*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag:     ${{ steps.read.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          set -euo pipefail
          V="$(tr -d '[:space:]' < build-tools/3rdparty/libmagic/version)"
          [ -n "$V" ] || { echo "version file is empty" >&2; exit 1; }
          if [[ "${{ github.event_name }}" == "push" ]]; then
            REF="${GITHUB_REF#refs/tags/}"
            EXPECT="lib-libmagic-$V"
            if [ "$REF" != "$EXPECT" ]; then
              echo "tag $REF does not match version file ($EXPECT)" >&2
              exit 1
            fi
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=lib-libmagic-$V" >> "$GITHUB_OUTPUT"

  build-linux-cross:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [linux-x86_64, linux-aarch64, android-arm64-v8a, android-x86_64, webasm]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/libmagic/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/libmagic-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  build-darwin-arm64:
    needs: resolve
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [macos-arm64, ios-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/libmagic/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/libmagic-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  build-darwin-x86_64:
    needs: resolve
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        target: [macos-x86_64, ios-x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/libmagic/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/libmagic-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  build-windows:
    needs: resolve
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [windows-x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: false
          install: >-
            git
            diffutils
            tar
            make
            autoconf
            automake
            libtool
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-lld
      - name: Build libmagic for ${{ matrix.target }}
        shell: msys2 {0}
        env:
          TARGET_PLATFORM: ${{ matrix.target }}
        run: |
          mkdir -p out
          OUTPUT_DIR="$(pwd)/out" \
              ./build-tools/3rdparty/libmagic/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/libmagic-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true
