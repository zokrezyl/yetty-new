name: Build 3rdparty — qemu

# qemu-system-riscv64 binary, per host platform (one tarball per yetty
# target). Triggered on `lib-qemu-<version>` tags. Version source of
# truth: build-tools/3rdparty/qemu/version.
#
# windows-x86_64 builds on a GitHub-hosted windows-latest runner via
# msys2/setup-msys2 (CLANG64) — no self-hosted runner needed.

on:
  push:
    tags:
      - 'lib-qemu-*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag:     ${{ steps.read.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          set -euo pipefail
          V="$(tr -d '[:space:]' < build-tools/3rdparty/qemu/version)"
          [ -n "$V" ] || { echo "version file is empty" >&2; exit 1; }
          if [[ "${{ github.event_name }}" == "push" ]]; then
            REF="${GITHUB_REF#refs/tags/}"
            EXPECT="lib-qemu-$V"
            if [ "$REF" != "$EXPECT" ]; then
              echo "tag $REF does not match version file ($EXPECT)" >&2
              exit 1
            fi
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=lib-qemu-$V" >> "$GITHUB_OUTPUT"

  #===========================================================================
  # Linux/Android targets — Ubuntu cross.
  #===========================================================================
  build-linux-cross:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x86_64
          - linux-aarch64
          - android-arm64-v8a
          - android-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/qemu/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/qemu-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  build-darwin-arm64:
    needs: resolve
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - macos-arm64
          - ios-arm64
          - tvos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/qemu/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/qemu-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  build-darwin-x86_64:
    needs: resolve
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        target:
          - macos-x86_64
          - ios-x86_64
          - tvos-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - run: mkdir -p out
      - run: |
          TARGET_PLATFORM="${{ matrix.target }}" \
          OUTPUT_DIR="$PWD/out" \
          ./build-tools/3rdparty/qemu/build.sh
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/qemu-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true

  # Windows: MSYS2 CLANG64 (clang + lld + mingw-w64 libs). Same toolchain as
  # poc/qemu/build-tools/build-windows-minimal.sh; no MSVC, no vcpkg, no
  # vcvarsall. setup-msys2 installs MSYS2 fresh per run with the listed
  # packages and gives us a `msys2 {0}` shell that already has $MSYSTEM=CLANG64
  # and the toolchain on PATH.
  build-windows:
    needs: resolve
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: false
          install: >-
            git
            diffutils
            tar
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-lld
            mingw-w64-clang-x86_64-glib2
            mingw-w64-clang-x86_64-pixman
            mingw-w64-clang-x86_64-libslirp
            mingw-w64-clang-x86_64-zlib
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-meson
            mingw-w64-clang-x86_64-pkgconf
            mingw-w64-clang-x86_64-python
            mingw-w64-clang-x86_64-python-pip

      - name: Build QEMU for ${{ matrix.target }}
        shell: msys2 {0}
        env:
          TARGET_PLATFORM: ${{ matrix.target }}
        run: |
          mkdir -p out
          OUTPUT_DIR="$(pwd)/out" \
              ./build-tools/3rdparty/qemu/build.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: out/qemu-${{ matrix.target }}-*.tar.gz
          fail_on_unmatched_files: true
